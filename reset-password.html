<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Random</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#202123; --panel:#2f3037; --panel-2:#343541; --border:#4a4b53; --text:#ececf1; --muted:#a9acb6; --accent:#10a37f; --accent-hover:#14b88e; --danger:#ef4444; --success:#7dd3a8; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:Arial,sans-serif; display:flex; align-items:center; justify-content:center; padding:24px; }
    .reset-shell { width:100%; max-width:520px; background:var(--panel); border:1px solid var(--border); border-radius:22px; padding:28px; box-shadow:0 18px 44px rgba(0,0,0,0.28); }
    .brand { font-size:24px; font-weight:700; margin-bottom:8px; }
    h1 { margin:0 0 10px; font-size:30px; line-height:1.1; }
    p { margin:0 0 18px; color:var(--muted); line-height:1.5; }
    .form-group { margin-bottom:14px; }
    label { display:block; margin-bottom:8px; font-size:14px; font-weight:700; }
    input { width:100%; height:48px; border:1px solid var(--border); border-radius:14px; background:var(--panel-2); color:var(--text); padding:0 14px; font-size:15px; outline:none; }
    input[readonly] { opacity:0.8; }
    .submit-btn,.secondary-btn { width:100%; min-height:48px; border:1px solid transparent; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; transition:0.18s ease; }
    .submit-btn { background:var(--accent); color:white; margin-top:6px; }
    .submit-btn:hover { background:var(--accent-hover); }
    .secondary-btn { margin-top:12px; background:var(--panel-2); color:var(--text); border-color:var(--border); text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .status-text { margin-top:16px; min-height:22px; font-size:14px; color:var(--muted); }
    .info-chip { display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border-radius:999px; background:var(--panel-2); border:1px solid var(--border); margin-bottom:16px; color:var(--muted); font-size:13px; font-weight:700; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <script>
    window.RANDOM_SUPABASE_URL = "https://stjupyawilpcojibfldp.supabase.co";
    window.RANDOM_SUPABASE_ANON_KEY = "sb_publishable_n9clw1rkeiAQRKffFI5bWg_QyQZe8jz";
  </script>
  <main class="reset-shell">
    <div class="brand">Random</div>
    <div class="info-chip" id="modeChip">Password recovery</div>
    <h1>Reset your password</h1>
    <p id="resetDescription">Open the reset link from your email, then choose a new password here.</p>
    <form id="resetForm">
      <div class="form-group" id="emailGroup">
        <label for="resetEmail">Email</label>
        <input type="email" id="resetEmail" readonly />
      </div>
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Create a new password" required />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your new password" required />
      </div>
      <button type="submit" class="submit-btn">Update Password</button>
    </form>
    <div class="status-text" id="resetStatus"></div>
    <a class="secondary-btn" href="index.html">Back to login</a>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const hasBackend = Boolean(window.RANDOM_SUPABASE_URL && window.RANDOM_SUPABASE_ANON_KEY && window.supabase);
    const supabaseClient = hasBackend ? window.supabase.createClient(window.RANDOM_SUPABASE_URL, window.RANDOM_SUPABASE_ANON_KEY) : null;
    const modeChip = document.getElementById('modeChip');
    const resetDescription = document.getElementById('resetDescription');
    const resetStatus = document.getElementById('resetStatus');
    const resetEmailInput = document.getElementById('resetEmail');
    const emailGroup = document.getElementById('emailGroup');
    const resetForm = document.getElementById('resetForm');
    const hash = window.location.hash || '';
    let resetMode = params.get('mode') === 'local' ? 'local' : 'recovery';
    let resetEmail = (params.get('email') || '').trim().toLowerCase();
    function setStatus(text, isError = false) {
      resetStatus.textContent = text;
      resetStatus.style.color = isError ? 'var(--danger)' : 'var(--success)';
    }
    function cleanupRecoveryUrl() {
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    function updatePageCopy() {
      if (resetMode === 'local') {
        modeChip.textContent = 'Local account reset';
        resetDescription.textContent = 'This browser is using local account mode. Set a new password for this account here.';
      } else {
        modeChip.textContent = 'Password recovery';
        resetDescription.textContent = 'Choose a new password to finish recovering your account.';
      }
      emailGroup.classList.toggle('hidden', !resetEmail);
      resetEmailInput.value = resetEmail;
    }
    async function hydrateRecoveryState() {
      if (!supabaseClient) {
        setStatus('This reset page needs Supabase configured, or use local mode from the login screen.', true);
        return;
      }
      try {
        await supabaseClient.auth.getSession();
        const { data, error } = await supabaseClient.auth.getUser();
        if (error) throw error;
        if (data && data.user && data.user.email) {
          resetEmail = data.user.email.toLowerCase();
        }
      } catch (error) {
        console.error(error);
      }
      if (!/type=recovery/i.test(hash) && params.get('reset') !== '1') {
        setStatus('Open this page from the password reset email you received.', true);
      }
      updatePageCopy();
    }
    if (supabaseClient) {
      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY' || (/type=recovery/i.test(hash) && session && session.user)) {
          resetMode = 'recovery';
          resetEmail = ((session && session.user && session.user.email) || resetEmail || '').toLowerCase();
          updatePageCopy();
          setStatus('Enter your new password below.');
        }
      });
    }
    resetForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      resetStatus.textContent = '';
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (newPassword.length < 6) { setStatus('Use at least 6 characters for your new password.', true); return; }
      if (newPassword !== confirmPassword) { setStatus('Passwords do not match.', true); return; }
      try {
        if (resetMode === 'local') {
          if (!resetEmail) throw new Error('Missing local account email. Go back and start from Forgot password again.');
          const users = JSON.parse(localStorage.getItem('random_users') || '[]');
          const user = users.find(u => (u.email || '').toLowerCase() === resetEmail);
          if (!user) throw new Error('That account was not found on this browser.');
          user.localPassword = newPassword;
          user.password = newPassword;
          localStorage.setItem('random_users', JSON.stringify(users));
          setStatus('Password updated. Redirecting you back to login...');
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
          return;
        }
        if (!supabaseClient) throw new Error('Supabase is not configured for password recovery.');
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
        if (error) throw error;
        cleanupRecoveryUrl();
        setStatus('Password updated. Redirecting you back to login...');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } catch (error) {
        console.error(error);
        setStatus(error.message || 'Could not update your password.', true);
      }
    });
    updatePageCopy();
    if (resetMode === 'local') {
      if (!resetEmail) setStatus('Missing local account email. Go back and start from Forgot password again.', true);
    } else {
      hydrateRecoveryState();
    }
  </script>
</body>
</html>
